name: TaskAI Morning Briefing

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Call morning briefing API
        run: |
          curl -X POST "${{ secrets.MORNING_BRIEFING_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
